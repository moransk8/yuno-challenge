name: Emergency Secret Rotation

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Payment provider to rotate (e.g. vortexpay)"
        required: true
        default: "vortexpay"
      merchant_id:
        description: "Specific merchant ID to rotate, or 'all' for all merchants"
        required: true
        default: "all"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: ["sandbox", "staging", "production"]
        default: "sandbox"
      reason:
        description: "Reason for emergency rotation (required for audit trail)"
        required: true

permissions:
  id-token: write   # OIDC auth to AWS — no long-lived keys in GitHub
  contents: read

jobs:
  # ── Pre-flight checks ───────────────────────────────────────────────────────
  pre-flight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          echo "🔄 Emergency rotation requested"
          echo "Provider: ${{ inputs.provider }}"
          echo "Merchant: ${{ inputs.merchant_id }}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Reason: ${{ inputs.reason }}"
          echo "Triggered by: ${{ github.actor }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Block production rotation without explicit approval
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "⚠️  PRODUCTION rotation requested — requires approval"
          fi

      - name: Log rotation event (audit trail)
        run: |
          echo "AUDIT_EVENT: emergency_rotation_triggered"
          echo "  actor=${{ github.actor }}"
          echo "  provider=${{ inputs.provider }}"
          echo "  merchant=${{ inputs.merchant_id }}"
          echo "  environment=${{ inputs.environment }}"
          echo "  reason=${{ inputs.reason }}"
          echo "  workflow_run_id=${{ github.run_id }}"
          echo "  timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ── Production requires manual approval ─────────────────────────────────────
  production-approval:
    name: Production Approval Gate
    needs: pre-flight
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    environment:
      name: production  # Configure required reviewers in GitHub Environment settings
    steps:
      - name: Approved for production rotation
        run: echo "✅ Production rotation approved by reviewer"

  # ── Execute Rotation ────────────────────────────────────────────────────────
  rotate:
    name: Execute Rotation
    needs: [pre-flight, production-approval]
    if: always() && needs.pre-flight.result == 'success' && (needs.production-approval.result == 'success' || inputs.environment != 'production')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/yuno-github-actions-rotation
          aws-region: us-east-1
          role-session-name: EmergencyRotation-${{ github.run_id }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Execute rotation
        env:
          PROVIDER: ${{ inputs.provider }}
          MERCHANT_ID: ${{ inputs.merchant_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          ROTATION_REASON: ${{ inputs.reason }}
          TRIGGERED_BY: ${{ github.actor }}
        run: python scripts/emergency_rotation.py

      - name: Post-rotation verification
        run: |
          echo "✅ Rotation completed. Verifying secret versions..."
          aws secretsmanager list-secret-version-ids \
            --secret-id "yuno/${{ inputs.environment }}/${{ inputs.provider }}/merchant-${{ inputs.merchant_id }}/api-key" \
            --query 'Versions[*].{VersionId:VersionId,Stages:VersionStages}' \
            --output table 2>/dev/null || echo "Skipped (merchant_id=all)"

      - name: Notify on success
        if: success()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_ALERT_TOPIC_ARN }} \
            --subject "✅ Emergency rotation completed" \
            --message "Provider: ${{ inputs.provider }} | Merchant: ${{ inputs.merchant_id }} | Env: ${{ inputs.environment }} | By: ${{ github.actor }} | Run: ${{ github.run_id }}"

      - name: Notify on failure
        if: failure()
        run: |
          aws sns publish \
            --topic-arn ${{ secrets.SNS_ALERT_TOPIC_ARN }} \
            --subject "❌ Emergency rotation FAILED" \
            --message "URGENT: Rotation failed! Provider: ${{ inputs.provider }} | Env: ${{ inputs.environment }} | Run: ${{ github.run_id }} | Check logs immediately"
